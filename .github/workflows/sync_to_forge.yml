name: Sync to Forge Education

on:
  push: # Se déclenche pour n'importe quel push

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Récupère tout l'historique pour éviter les conflits

      - name: Configuration de l'identité Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Propulsion vers la Forge Éducation
        run: |
          # 1. On extrait le nom de la branche actuelle
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          echo "Branche détectée : $BRANCH_NAME"
          
          # 2. On ajoute proprement le dépôt de la Forge avec le Token
          git remote add forge https://barthelemy:${{ secrets.FORGE_TOKEN }}@forge.apps.education.fr/barthelemy/edge-ai-education.git
          
          # 3. On pousse uniquement la branche concernée de manière propre
          git push forge $BRANCH_NAME --force